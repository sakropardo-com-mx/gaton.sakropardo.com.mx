name: Deploy to Hetzner Production

on:
  push:
    branches:
      - master
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout del código
        uses: actions/checkout@v4

      - name: 🔐 Generar archivo .env
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" > ./web/.env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> ./web/.env

      - name: 🔑 Configurar Llave SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.HETZNER_SSH_KEY }}

      - name: 🛡️ Autorizar Servidor Hetzner
        run: ssh-keyscan -H ${{ secrets.HETZNER_IP }} >> ~/.ssh/known_hosts

      - name: 📦 Instalar dependencias web y Compilar
        working-directory: ./web
        run: |
          npm install
          npm run build

      - name: 🚀 Desplegar web al servidor
        run: |
          rsync -avz --delete \
            ./web/dist/ root@${{ secrets.HETZNER_IP }}:/opt/jadenn-stack/web/public/sakropardo-com-mx/gaton.sakropardo.com.mx/

      - name: ⚙️ Desplegar Backend (Streamer)
        run: |
          ssh root@${{ secrets.HETZNER_IP }} "mkdir -p /opt/jadenn-stack/apps/sakropardo-com-mx/gaton.sakropardo.com.mx-backend"
          rsync -avz --delete \
            ./backend/ root@${{ secrets.HETZNER_IP }}:/opt/jadenn-stack/apps/sakropardo-com-mx/gaton.sakropardo.com.mx-backend/
            
      - name: 🐳 Reconstruir y Levantar Backend en Docker
        run: |
          ssh root@${{ secrets.HETZNER_IP }} << 'EOF'
            cd /opt/jadenn-stack/apps/sakropardo-com-mx/gaton.sakropardo.com.mx-backend
            docker build -t gaton-streamer-backend .
            docker stop gaton-streamer || true
            docker rm gaton-streamer || true
            # Create downloads directory for streaming
            mkdir -p /opt/jadenn-stack/web/public/sakropardo-com-mx/gaton.sakropardo.com.mx/streams
            docker run -d \
              --name gaton-streamer \
              --restart unless-stopped \
              -p 8001:8000 \
              -v /opt/jadenn-stack/web/public/sakropardo-com-mx/gaton.sakropardo.com.mx/streams:/downloads \
              gaton-streamer-backend
          EOF
